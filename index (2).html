<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 Cheltenham 2025 — Tipping Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #0a2e1a;
    --green-light: #2db362;
    --gold: #d4a017;
    --gold-light: #f0c040;
    --cream: #f5f0e8;
    --white: #ffffff;
    --gray: #8a9a8e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--green-dark); color:var(--cream); font-family:'Barlow',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px),
      repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px);
  }
  .header { position:relative; z-index:1; text-align:center; padding:40px 20px 30px; background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,transparent 100%); border-bottom:3px solid var(--gold); }
  .badge { display:inline-block; background:var(--gold); color:var(--green-dark); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:4px 16px; border-radius:2px; margin-bottom:12px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,6vw,4rem); font-weight:900; color:var(--white); line-height:1; text-shadow:0 2px 20px rgba(0,0,0,0.5); }
  h1 span { color:var(--gold-light); }
  .subtitle { font-family:'Barlow Condensed',sans-serif; font-size:16px; letter-spacing:4px; text-transform:uppercase; color:var(--gray); margin-top:6px; }
  .status-bar { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:14px; flex-wrap:wrap; }
  .live-dot { display:inline-flex; align-items:center; gap:6px; font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--green-light); }
  .live-dot::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--green-light); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  #lastUpdated { font-size:12px; color:var(--gray); }
  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:30px 20px; }
  .top-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px; }
  .tabs { display:flex; gap:4px; background:rgba(0,0,0,0.3); padding:6px; border-radius:8px; flex-wrap:wrap; }
  .tab { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; text-transform:uppercase; padding:10px 24px; border-radius:5px; border:none; cursor:pointer; background:transparent; color:var(--gray); transition:all 0.2s; }
  .tab:hover { color:var(--cream); }
  .tab.active { background:var(--gold); color:var(--green-dark); }
  .refresh-btn { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:1px; text-transform:uppercase; padding:10px 22px; border-radius:6px; border:1px solid rgba(212,160,23,0.4); cursor:pointer; background:rgba(212,160,23,0.1); color:var(--gold); transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
  .refresh-btn:hover { background:rgba(212,160,23,0.25); }
  .spin { display:inline-block; }
  .spinning .spin { animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .section-title { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--gold-light); margin-bottom:20px; display:flex; align-items:center; gap:12px; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(212,160,23,0.4),transparent); }
  .leaderboard { width:100%; border-collapse:separate; border-spacing:0 4px; margin-bottom:40px; }
  .leaderboard thead th { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gray); padding:8px 16px; text-align:left; }
  .leaderboard thead th.r { text-align:right; }
  .leaderboard tbody tr { background:rgba(255,255,255,0.04); transition:all 0.2s; animation:fadeIn 0.4s ease both; }
  .leaderboard tbody tr:hover { background:rgba(255,255,255,0.08); transform:translateX(3px); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .leaderboard td { padding:14px 16px; }
  .leaderboard td:first-child { border-radius:6px 0 0 6px; }
  .leaderboard td:last-child { border-radius:0 6px 6px 0; }
  .rank-1 { background:linear-gradient(90deg,rgba(212,160,23,0.18),rgba(212,160,23,0.05)) !important; }
  .rank-2 { background:linear-gradient(90deg,rgba(192,192,192,0.12),rgba(192,192,192,0.03)) !important; }
  .rank-3 { background:linear-gradient(90deg,rgba(205,127,50,0.12),rgba(205,127,50,0.03)) !important; }
  .pos { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; color:var(--gray); width:44px; }
  .name { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:17px; color:var(--white); min-width:130px; }
  .dscore { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:600; text-align:right; color:var(--cream); min-width:54px; }
  .dscore.z { color:var(--gray); }
  .tscore { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; text-align:right; color:var(--gold-light); min-width:68px; }
  .barcell { width:100%; min-width:100px; padding-right:16px !important; }
  .bartrack { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .barfill { height:100%; background:linear-gradient(90deg,var(--green-light),var(--gold)); border-radius:3px; transition:width 0.8s cubic-bezier(.4,0,.2,1); }
  .day-panel { display:none; }
  .day-panel.active { display:block; }
  .race-wrap { overflow-x:auto; margin-bottom:30px; }
  .race-table { border-collapse:collapse; font-size:13px; white-space:nowrap; }
  .race-table th { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gray); padding:6px 12px; border-bottom:1px solid rgba(255,255,255,0.08); text-align:left; }
  .race-table td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
  .race-table tr:hover td { background:rgba(255,255,255,0.04); }
  .rlabel { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; color:var(--gold); }
  .rtime { font-weight:400; color:var(--gray); font-size:11px; }
  .horse { color:var(--gray); font-size:12px; }
  .pts { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; text-align:right; }
  .pts.p { color:var(--green-light); }
  .pts.z { color:rgba(255,255,255,0.18); }
  .no-data { text-align:center; padding:50px; color:var(--gray); font-style:italic; }
  .error-box { background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.4); border-radius:8px; padding:20px 24px; color:#e74c3c; font-size:14px; margin:20px 0; line-height:1.6; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green-light); color:var(--green-dark); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; padding:12px 28px; border-radius:30px; opacity:0; transition:all 0.3s; z-index:100; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:20px; }
  .loading-horse { font-size:3rem; animation:gallop 0.6s infinite alternate; }
  @keyframes gallop { from{transform:translateY(0) rotate(-5deg)} to{transform:translateY(-10px) rotate(5deg)} }
  .loading-text { font-family:'Barlow Condensed',sans-serif; font-size:16px; letter-spacing:3px; text-transform:uppercase; color:var(--gray); }
  @media(max-width:768px){ .barcell,.dscore{display:none} .name{font-size:14px;min-width:90px} }
</style>
</head>
<body>

<div class="header">
  <div class="badge">🏇 The Festival 2025</div>
  <h1><span>Cheltenham</span> Tipping Competition</h1>
  <div class="subtitle">The Ultimate Four-Day Challenge</div>
  <div class="status-bar">
    <div class="live-dot">Live</div>
    <div id="lastUpdated">Loading scores...</div>
  </div>
</div>

<div class="container">
  <div class="top-bar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overall',this)">🏆 Overall</button>
      <button class="tab" onclick="switchTab('day1',this)">Day 1</button>
      <button class="tab" onclick="switchTab('day2',this)">Day 2</button>
      <button class="tab" onclick="switchTab('day3',this)">Day 3</button>
      <button class="tab" onclick="switchTab('day4',this)">Day 4</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAndRender()">
      <span class="spin">&#8635;</span> Refresh Scores
    </button>
  </div>

  <div id="panel-overall" class="day-panel active">
    <div class="section-title"><span>🏆</span> Overall Standings</div>
    <div id="overall-board">
      <div class="loading">
        <div class="loading-horse">🏇</div>
        <div class="loading-text">Fetching scores...</div>
      </div>
    </div>
  </div>
  <div id="panel-day1" class="day-panel">
    <div class="section-title">📅 Day 1 — Tuesday 11th March</div>
    <div id="day1-board"></div>
  </div>
  <div id="panel-day2" class="day-panel">
    <div class="section-title">📅 Day 2 — Wednesday 12th March</div>
    <div id="day2-board"></div>
  </div>
  <div id="panel-day3" class="day-panel">
    <div class="section-title">📅 Day 3 — Thursday 13th March</div>
    <div id="day3-board"></div>
  </div>
  <div id="panel-day4" class="day-panel">
    <div class="section-title">📅 Day 4 — Friday 14th March</div>
    <div id="day4-board"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1wakZrFQ1V-TvR2QHnKg_-OVF7FgZs91KjAZRLyzrB2E';
const DAYS = 4;
const RACES_PER_DAY = 7;
const RACE_TIMES = ['13:20','14:00','14:40','15:20','16:00','16:40','17:20'];

let competitors = [];
let scores = {};
let dayTotals = {};

// Uses Google's own gviz/tq endpoint — no third-party proxy, no API key needed.
// Works as long as the sheet is set to "Anyone with the link can view".
function fetchSheetRows() {
  return new Promise(function(resolve, reject) {
    var cb = 'gviz_' + Date.now();
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&cb=' + cb;
    var script = document.createElement('script');
    script.src = url;

    var timer = setTimeout(function() {
      cleanup();
      reject(new Error('Timeout'));
    }, 12000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cb] = function(data) {
      cleanup();
      try {
        var rows = (data.table.rows || []).map(function(row) {
          return (row.c || []).map(function(cell) {
            if (!cell || cell.v === null || cell.v === undefined) return '';
            return String(cell.v).trim();
          });
        });
        resolve(rows);
      } catch(e) { reject(e); }
    };

    script.onerror = function() { cleanup(); reject(new Error('Script load error')); };
    document.head.appendChild(script);
  });
}

function processData(rows) {
  competitors = [];
  scores = {};
  dayTotals = {};

  for (var d = 1; d <= DAYS; d++) {
    scores[d] = {};
    for (var r = 1; r <= RACES_PER_DAY; r++) scores[d][r] = [];
    dayTotals[d] = [];
  }

  var currentDay = 0, currentRace = 0, headerParsed = false;

  for (var li = 0; li < rows.length; li++) {
    var row = rows[li];
    var first = (row[0] || '').trim();

    if (/^DAY\s*1$/i.test(first)) {
      currentDay = 1; currentRace = 0;
      if (!headerParsed) {
        for (var c = 1; c < row.length; c += 2) {
          var n = (row[c] || '').trim();
          if (n) competitors.push(n);
        }
        for (var d2 = 1; d2 <= DAYS; d2++) {
          dayTotals[d2] = new Array(competitors.length).fill(0);
          for (var r2 = 1; r2 <= RACES_PER_DAY; r2++)
            scores[d2][r2] = competitors.map(function() { return { horse:'', pts:0 }; });
        }
        headerParsed = true;
      }
      continue;
    }

    if (/^DAY\s*(\d)/i.test(first)) {
      currentDay = parseInt(first.match(/\d/)[0]);
      currentRace = 0;
      continue;
    }

    if (/^Race\s*\d/i.test(first) && currentDay > 0 && competitors.length > 0) {
      currentRace++;
      if (currentRace > RACES_PER_DAY) continue;
      for (var c2 = 0; c2 < competitors.length; c2++) {
        var horse = (row[1 + c2*2] || '').trim();
        var pts   = parseInt(row[2 + c2*2]) || 0;
        if (scores[currentDay] && scores[currentDay][currentRace])
          scores[currentDay][currentRace][c2] = { horse: horse, pts: pts };
      }
    }
  }

  for (var d3 = 1; d3 <= DAYS; d3++) {
    dayTotals[d3] = new Array(competitors.length).fill(0);
    for (var r3 = 1; r3 <= RACES_PER_DAY; r3++) {
      for (var c3 = 0; c3 < competitors.length; c3++) {
        dayTotals[d3][c3] += (scores[d3][r3] && scores[d3][r3][c3] ? scores[d3][r3][c3].pts : 0);
      }
    }
  }
}

function getOverall() {
  return competitors.map(function(_, c) {
    var t = 0;
    for (var d = 1; d <= DAYS; d++) t += (dayTotals[d][c] || 0);
    return t;
  });
}

function renderOverall() {
  var overall = getOverall();
  var max = Math.max.apply(null, overall.concat([1]));

  var ranked = competitors.map(function(name, i) {
    return { name: name, total: overall[i], days: [1,2,3,4].map(function(d){ return dayTotals[d][i]||0; }) };
  }).sort(function(a,b){ return b.total - a.total; });

  var h = '<table class="leaderboard"><thead><tr>' +
    '<th>#</th><th>Competitor</th>' +
    '<th class="r">Day 1</th><th class="r">Day 2</th><th class="r">Day 3</th><th class="r">Day 4</th>' +
    '<th class="barcell"></th><th class="r">Total</th>' +
    '</tr></thead><tbody>';

  ranked.forEach(function(p, i) {
    var pos = i+1;
    var rc  = pos===1?'rank-1':pos===2?'rank-2':pos===3?'rank-3':'';
    var med = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
    var pct = (p.total/max*100).toFixed(1);
    var dc  = p.days.map(function(d){ return '<td class="dscore '+(d?'':'z')+'">'+(d||'—')+'</td>'; }).join('');
    h += '<tr class="'+rc+'" style="animation-delay:'+(i*25)+'ms">' +
      '<td class="pos">'+med+'</td><td class="name">'+p.name+'</td>'+dc+
      '<td class="barcell"><div class="bartrack"><div class="barfill" style="width:'+pct+'%"></div></div></td>'+
      '<td class="tscore">'+p.total+'</td></tr>';
  });

  h += '</tbody></table>';
  document.getElementById('overall-board').innerHTML = h;
}

function renderDay(day) {
  var el   = document.getElementById('day'+day+'-board');
  var tots = dayTotals[day] || [];
  var max  = Math.max.apply(null, tots.concat([1]));

  if (!tots.some(function(t){ return t > 0; })) {
    el.innerHTML = '<div class="no-data">No scores for Day '+day+' yet — check back after the races! 🏇</div>';
    return;
  }

  var ranked = competitors.map(function(name,i){ return {name:name,pts:tots[i]||0}; })
    .sort(function(a,b){ return b.pts-a.pts; });

  var h = '<table class="leaderboard" style="margin-bottom:30px"><thead><tr>' +
    '<th>#</th><th>Competitor</th><th class="barcell"></th><th class="r">Points</th>' +
    '</tr></thead><tbody>';

  ranked.forEach(function(p,i) {
    var pos = i+1;
    var rc  = pos===1?'rank-1':pos===2?'rank-2':pos===3?'rank-3':'';
    var med = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
    var pct = (p.pts/max*100).toFixed(1);
    h += '<tr class="'+rc+'" style="animation-delay:'+(i*20)+'ms">' +
      '<td class="pos">'+med+'</td><td class="name">'+p.name+'</td>' +
      '<td class="barcell"><div class="bartrack"><div class="barfill" style="width:'+pct+'%"></div></div></td>' +
      '<td class="tscore">'+(p.pts||'—')+'</td></tr>';
  });
  h += '</tbody></table>';

  h += '<div class="section-title" style="font-size:1.1rem">Race by Race Breakdown</div>' +
    '<div class="race-wrap"><table class="race-table"><thead><tr><th>Race</th>';
  competitors.forEach(function(n){ h += '<th>'+n+'</th>'; });
  h += '</tr></thead><tbody>';

  for (var r = 1; r <= RACES_PER_DAY; r++) {
    var rs = (scores[day] && scores[day][r]) ? scores[day][r] : [];
    if (!rs.some(function(s){ return s.horse; })) continue;
    h += '<tr><td><div class="rlabel">Race '+r+'</div><div class="rtime">'+(RACE_TIMES[r-1]||'')+'</div></td>';
    rs.forEach(function(s) {
      h += '<td><div class="horse">'+(s.horse||'—')+'</div>' +
           '<div class="pts '+(s.pts>0?'p':'z')+'">'+(s.pts>0?s.pts:'—')+'</div></td>';
    });
    h += '</tr>';
  }

  h += '<tr style="background:rgba(212,160,23,0.1)"><td><div class="rlabel" style="color:var(--gold)">TOTAL</div></td>';
  tots.forEach(function(t) {
    h += '<td><div class="pts '+(t>0?'p':'z')+'" style="font-size:17px">'+(t>0?t:'—')+'</div></td>';
  });
  h += '</tr></tbody></table></div>';

  el.innerHTML = h;
}

function renderAll() {
  renderOverall();
  for (var d = 1; d <= DAYS; d++) renderDay(d);
}

function fetchAndRender() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  fetchSheetRows().then(function(rows) {
    processData(rows);
    renderAll();
    var now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) +
      ' \u00B7 ' + now.toLocaleDateString('en-GB');
    showToast('✅ Scores refreshed!');
    btn.classList.remove('spinning');
  }).catch(function(err) {
    console.error(err);
    document.getElementById('lastUpdated').textContent = 'Error loading scores';
    document.getElementById('overall-board').innerHTML =
      '<div class="error-box">⚠️ Could not load scores from Google Sheets.<br><br>' +
      'Please check the sheet is still set to <strong>"Anyone with the link can view"</strong>, then click Refresh.</div>';
    showToast('❌ Could not fetch scores');
    btn.classList.remove('spinning');
  });
}

function switchTab(panel, btn) {
  document.querySelectorAll('.day-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('panel-'+panel).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// Load on page open, then auto-refresh every 60 seconds
fetchAndRender();
setInterval(fetchAndRender, 60000);
</script>
</body>
</html>
